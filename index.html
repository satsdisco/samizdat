<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Source+Serif+4:ital,wght@0,400;0,600;0,700;1,400&family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet">
    <title>Samizdat — Write freely. Publish forever.</title>
    <meta name="description" content="Long-form publishing on nostr. No accounts. No censorship. Your keys, your words." />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://samizdat.press/" />
    <meta property="og:title" content="Samizdat — Write freely. Publish forever." />
    <meta property="og:description" content="Long-form publishing on nostr. No accounts. No censorship. Your keys, your words." />
    <meta property="og:image" content="https://samizdat.press/og-image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:site_name" content="Samizdat" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Samizdat — Write freely. Publish forever." />
    <meta name="twitter:description" content="Long-form publishing on nostr. No accounts. No censorship. Your keys, your words." />
    <meta name="twitter:image" content="https://samizdat.press/og-image.png" />

    <!-- Theme -->
    <meta name="theme-color" content="#f5f0e1" />
  </head>
  <body>
    <div id="root"></div>
    <script>
      // Handle stale chunk errors after deploys — auto-reload once
      window.addEventListener('error', e => {
        if (e.message && e.message.includes('dynamically imported module')) {
          if (!sessionStorage.getItem('chunk_reload')) {
            sessionStorage.setItem('chunk_reload', '1');
            window.location.reload();
          }
        }
      });
      window.addEventListener('unhandledrejection', e => {
        if (e.reason && String(e.reason).includes('dynamically imported module')) {
          if (!sessionStorage.getItem('chunk_reload')) {
            sessionStorage.setItem('chunk_reload', '1');
            window.location.reload();
          }
        }
      });
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
