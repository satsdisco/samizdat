<svg xmlns="http://www.w3.org/2000/svg" width="200" height="200" viewBox="0 0 200 200">
  <rect width="200" height="200" fill="#141414"/>
  <!-- Diagonal texture lines -->
  <g stroke="#1e1e1e" stroke-width="1">
    <line x1="0" y1="20" x2="20" y2="0"/>
    <line x1="0" y1="40" x2="40" y2="0"/>
    <line x1="0" y1="60" x2="60" y2="0"/>
    <line x1="0" y1="80" x2="80" y2="0"/>
    <line x1="0" y1="100" x2="100" y2="0"/>
    <line x1="0" y1="120" x2="120" y2="0"/>
    <line x1="0" y1="140" x2="140" y2="0"/>
    <line x1="0" y1="160" x2="160" y2="0"/>
    <line x1="0" y1="180" x2="180" y2="0"/>
    <line x1="0" y1="200" x2="200" y2="0"/>
    <line x1="20" y1="200" x2="200" y2="20"/>
    <line x1="40" y1="200" x2="200" y2="40"/>
    <line x1="60" y1="200" x2="200" y2="60"/>
    <line x1="80" y1="200" x2="200" y2="80"/>
    <line x1="100" y1="200" x2="200" y2="100"/>
    <line x1="120" y1="200" x2="200" y2="120"/>
    <line x1="140" y1="200" x2="200" y2="140"/>
    <line x1="160" y1="200" x2="200" y2="160"/>
    <line x1="180" y1="200" x2="200" y2="180"/>
  </g>
  <!-- Red star accent -->
  <polygon points="100,55 106,75 128,75 110,87 117,107 100,95 83,107 90,87 72,75 94,75" fill="#8b1a1a" opacity="0.35"/>
  <!-- S monogram -->
  <text x="100" y="145" text-anchor="middle" font-family="serif" font-size="48" font-weight="bold" fill="#2a2a2a" opacity="0.6">S</text>
</svg>
