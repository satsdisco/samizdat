<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <rect width="512" height="512" rx="80" fill="#1a1a1a"/>
  
  <!-- Bold serif S -->
  <text x="240" y="390" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-weight="bold" font-size="380" fill="#c0392b">S</text>
  
  <!-- Elegant quill feather rising from top-right of S -->
  <!-- Shaft — gentle curve rising up and right -->
  <path d="M 320 145 Q 360 100, 400 55" stroke="#dcd2be" stroke-width="7" fill="none" stroke-linecap="round"/>
  
  <!-- Feather vane — left side barbs -->
  <path d="M 400 55 Q 375 35, 355 15" stroke="#dcd2be" stroke-width="4" fill="none" stroke-linecap="round"/>
  <path d="M 390 68 Q 365 55, 348 38" stroke="#dcd2be" stroke-width="3.5" fill="none" stroke-linecap="round" opacity="0.85"/>
  <path d="M 378 82 Q 355 72, 342 58" stroke="#dcd2be" stroke-width="3" fill="none" stroke-linecap="round" opacity="0.7"/>
  
  <!-- Feather vane — right side barbs -->
  <path d="M 400 55 Q 420 30, 435 12" stroke="#dcd2be" stroke-width="4" fill="none" stroke-linecap="round"/>
  <path d="M 390 68 Q 415 48, 432 32" stroke="#dcd2be" stroke-width="3.5" fill="none" stroke-linecap="round" opacity="0.85"/>
  <path d="M 378 82 Q 405 68, 425 55" stroke="#dcd2be" stroke-width="3" fill="none" stroke-linecap="round" opacity="0.7"/>
</svg>
